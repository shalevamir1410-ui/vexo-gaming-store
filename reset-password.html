<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VEXO Gaming - איפוס סיסמה</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Outfit:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-red: #ff0000;
            --dark-bg: #0a0a0a;
            --card-bg: #151515;
            --neon-glow: 0 0 10px rgba(255,0,0,0.5), 0 0 20px rgba(255,0,0,0.3);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: var(--dark-bg);
            background-image: radial-gradient(circle at 2px 2px, #1a1a1a 1px, transparent 0);
            background-size: 24px 24px;
            font-family: 'Outfit', sans-serif;
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            background: var(--card-bg);
            border: 1.5px solid var(--primary-red);
            box-shadow: var(--neon-glow), 0 0 60px rgba(255,0,0,0.1);
            border-radius: 20px;
            padding: 50px 45px 40px;
            width: 100%;
            max-width: 480px;
        }
        .logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 26px;
            font-weight: 700;
            text-align: center;
            direction: ltr;
            margin-bottom: 10px;
        }
        .logo span { color: var(--primary-red); }
        h2 {
            text-align: center;
            font-weight: 800;
            font-size: 22px;
            margin-bottom: 30px;
            color: white;
        }
        label {
            display: block;
            text-align: right;
            font-size: 14px;
            color: #bbb;
            margin-bottom: 8px;
        }
        .input-wrapper {
            position: relative;
            margin-bottom: 20px;
        }
        .input-wrapper input {
            width: 100%;
            background: #1e1e1e;
            border: 1px solid #333;
            border-radius: 10px;
            padding: 14px 45px 14px 14px;
            color: white;
            font-size: 15px;
            font-family: 'Outfit', sans-serif;
            transition: border-color 0.2s;
            direction: rtl;
        }
        .input-wrapper input:focus {
            outline: none;
            border-color: var(--primary-red);
        }
        .input-wrapper input::placeholder { color: #555; }
        .eye-btn {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #555;
            cursor: pointer;
            font-size: 16px;
            padding: 0;
            transition: color 0.2s;
        }
        .eye-btn:hover { color: #aaa; }
        .btn-submit {
            width: 100%;
            background: var(--primary-red);
            color: white;
            border: none;
            border-radius: 10px;
            padding: 16px;
            font-size: 17px;
            font-weight: 800;
            font-family: 'Outfit', sans-serif;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            margin-top: 5px;
        }
        .btn-submit:hover { background: #cc0000; }
        .btn-submit:active { transform: scale(0.98); }
        .back-link {
            text-align: center;
            margin-top: 20px;
        }
        .back-link a {
            color: var(--primary-red);
            text-decoration: none;
            font-size: 14px;
            transition: opacity 0.2s;
        }
        .back-link a:hover { opacity: 0.75; }
        .msg {
            text-align: center;
            font-size: 14px;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 18px;
            display: none;
        }
        .msg.success { background: rgba(39,174,96,0.15); color: #27ae60; border: 1px solid #27ae60; }
        .msg.error { background: rgba(255,0,0,0.1); color: #ff6b6b; border: 1px solid rgba(255,0,0,0.3); }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo"><span>VEXO</span> Gaming</div>
        <h2>איפוס סיסמה</h2>

        <div id="msg" class="msg"></div>

        <form id="resetForm" onsubmit="submitReset(event)">
            <label>סיסמה חדשה (לפחות 8 תווים, אות גדולה, קטנה, מספר ותו מיוחד):</label>
            <div class="input-wrapper">
                <button type="button" class="eye-btn" onclick="togglePass('newPass', this)">
                    <i class="fas fa-eye"></i>
                </button>
                <input type="password" id="newPass" placeholder="סיסמה חדשה" required minlength="8">
            </div>

            <label>אימות סיסמה:</label>
            <div class="input-wrapper">
                <button type="button" class="eye-btn" onclick="togglePass('confirmPass', this)">
                    <i class="fas fa-eye"></i>
                </button>
                <input type="password" id="confirmPass" placeholder="הכנס סיסמה שוב" required minlength="8">
            </div>

            <button type="submit" class="btn-submit" id="submitBtn">סיימתי - עדכן סיסמה</button>
        </form>

        <div class="back-link"><a href="/">חזרה לדף הבית</a></div>
    </div>

    <script>
        function togglePass(inputId, btn) {
            const input = document.getElementById(inputId);
            const icon = btn.querySelector('i');
            if (input.type === 'password') {
                input.type = 'text';
                icon.className = 'fas fa-eye-slash';
            } else {
                input.type = 'password';
                icon.className = 'fas fa-eye';
            }
        }

        function showMsg(text, type) {
            const el = document.getElementById('msg');
            el.textContent = text;
            el.className = 'msg ' + type;
            el.style.display = 'block';
        }

        // קח את ה-token מה-URL
        const urlParams = new URLSearchParams(window.location.search);
        const resetToken = urlParams.get('token');

        if (!resetToken) {
            showMsg('קישור לא תקין. בקש קישור חדש.', 'error');
            document.getElementById('submitBtn').disabled = true;
        }

        async function submitReset(e) {
            e.preventDefault();
            const newPass = document.getElementById('newPass').value;
            const confirmPass = document.getElementById('confirmPass').value;

            if (newPass !== confirmPass) return showMsg('הסיסמאות לא תואמות', 'error');
            if (newPass.length < 8) return showMsg('סיסמה חייבת להכיל לפחות 8 תווים', 'error');
            if (!/[A-Z]/.test(newPass) || !/[a-z]/.test(newPass) || !/[0-9]/.test(newPass) || !/[@$!%*?&]/.test(newPass)) {
                return showMsg('הסיסמה חייבת להכיל אות גדולה, אות קטנה, מספר ותו מיוחד', 'error');
            }

            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.textContent = 'מעדכן...';

            try {
                const res = await fetch('/api/auth/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token: resetToken, password: newPass })
                });
                const data = await res.json();
                if (res.ok && data.success) {
                    showMsg('הסיסמה עודכנה בהצלחה! מעביר אותך להתחברות...', 'success');
                    document.getElementById('resetForm').style.display = 'none';
                    setTimeout(() => window.location.href = '/', 2500);
                } else {
                    showMsg(data.error || 'שגיאה, נסה שנית', 'error');
                    btn.disabled = false;
                    btn.textContent = 'סיימתי - עדכן סיסמה';
                }
            } catch {
                showMsg('שגיאת שרת, נסה שנית', 'error');
                btn.disabled = false;
                btn.textContent = 'סיימתי - עדכן סיסמה';
            }
        }
    </script>
</body>
</html>
