<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>איפוס סיסמה - VEXO Gaming Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Heebo', sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: #111;
            border: 2px solid #ff0000;
            border-radius: 20px;
            padding: 40px;
            max-width: 450px;
            width: 100%;
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.3);
        }
        
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .logo h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 32px;
            color: #ff0000;
        }
        
        .logo span {
            color: white;
        }
        
        h2 {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            font-size: 24px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            color: #aaa;
            margin-bottom: 8px;
            font-size: 14px;
        }
        
        input {
            width: 100%;
            padding: 12px 15px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            color: white;
            font-size: 16px;
            font-family: 'Heebo', sans-serif;
            transition: 0.3s;
        }
        
        input:focus {
            outline: none;
            border-color: #ff0000;
        }
        
        .password-wrapper {
            position: relative;
        }
        
        .password-wrapper input {
            padding-left: 45px;
        }
        
        .eye-icon {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #666;
            cursor: pointer;
            font-size: 18px;
        }
        
        .btn {
            width: 100%;
            padding: 15px;
            background: #ff0000;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            font-family: 'Heebo', sans-serif;
        }
        
        .btn:hover {
            background: #cc0000;
        }
        
        .btn:disabled {
            background: #666;
            cursor: not-allowed;
        }
        
        .error {
            color: #ff0000;
            font-size: 14px;
            margin-top: 10px;
            text-align: center;
        }
        
        .success {
            color: #00ff00;
            font-size: 14px;
            margin-top: 10px;
            text-align: center;
        }
        
        .back-link {
            text-align: center;
            margin-top: 20px;
            color: #666;
            font-size: 14px;
        }
        
        .back-link a {
            color: #ff0000;
            text-decoration: none;
            cursor: pointer;
        }
        
        .back-link a:hover {
            text-decoration: underline;
        }
        
        .loading {
            text-align: center;
            color: #aaa;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <h1><span>VEXO</span> Gaming</h1>
        </div>
        
        <h2>איפוס סיסמה</h2>
        
        <div id="loading" class="loading">בודק את הלינק...</div>
        
        <form id="resetForm" style="display: none;">
            <div class="form-group">
                <label>סיסמה חדשה (לפחות 6 תווים):</label>
                <div class="password-wrapper">
                    <input type="password" id="newPassword" placeholder="סיסמה חדשה">
                    <i class="fas fa-eye eye-icon" onclick="togglePassword('newPassword', this)"></i>
                </div>
            </div>
            
            <div class="form-group">
                <label>אימות סיסמה:</label>
                <div class="password-wrapper">
                    <input type="password" id="confirmPassword" placeholder="הכנס סיסמה שוב">
                    <i class="fas fa-eye eye-icon" onclick="togglePassword('confirmPassword', this)"></i>
                </div>
            </div>
            
            <div id="error" class="error"></div>
            <div id="success" class="success"></div>
            
            <button type="submit" class="btn" id="submitBtn">סיימתי - עדכן סיסמה</button>
        </form>
        
        <div id="invalidLink" style="display: none; text-align: center; color: #ff0000;">
            <p>הלינק לא תקף או פג תוקף</p>
            <p style="margin-top: 10px; color: #666;">בקש לינק חדש לאיפוס סיסמה</p>
        </div>
        
        <div class="back-link">
            <a href="/">חזרה לדף הבית</a>
        </div>
    </div>

    <script>
        const token = new URLSearchParams(window.location.search).get('token');
        
        function togglePassword(inputId, icon) {
            const input = document.getElementById(inputId);
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }
        
        async function resetPassword(e) {
            e.preventDefault();
            
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const errorDiv = document.getElementById('error');
            const successDiv = document.getElementById('success');
            const submitBtn = document.getElementById('submitBtn');
            
            errorDiv.textContent = '';
            successDiv.textContent = '';
            
            if (!newPassword || newPassword.length < 6) {
                errorDiv.textContent = 'הסיסמה חייבת להיות לפחות 6 תווים';
                return;
            }
            
            if (newPassword !== confirmPassword) {
                errorDiv.textContent = 'הסיסמאות לא זהות';
                return;
            }
            
            submitBtn.disabled = true;
            submitBtn.textContent = 'מעדכן...';
            
            try {
                const response = await fetch('/api/reset-password', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        token: token,
                        newPassword: newPassword
                    })
                });
                
                const data = await response.json();
                
                if (data.message) {
                    successDiv.textContent = 'הסיסמה עודכנה בהצלחה! מעביר לדף הבית...';
                    setTimeout(() => {
                        window.location.href = '/';
                    }, 2000);
                } else {
                    errorDiv.textContent = data.error || 'שגיאה בעדכון הסיסמה';
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'סיימתי - עדכן סיסמה';
                }
            } catch (error) {
                errorDiv.textContent = 'שגיאה בתקשורת';
                submitBtn.disabled = false;
                submitBtn.textContent = 'סיימתי - עדכן סיסמה';
            }
        }
        
        document.getElementById('resetForm').addEventListener('submit', resetPassword);
        
        // Check if token is valid
        if (!token) {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('invalidLink').style.display = 'block';
        } else {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('resetForm').style.display = 'block';
        }
    </script>
</body>
</html>
